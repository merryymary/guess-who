name: Main Channel Notifications

on:
  push:
    branches:
      - main

jobs:
  notify-main:
    runs-on: ubuntu-latest

    steps:
      # If the actor is "merryymary", use DISCORD_WEBHOOK_MERRY
      - name: Deployment - Merry
        if: github.actor == 'merryymary'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_MERRY }}
          nodetail: true
          title: ""
          description: |
            ✅ ** Merry merged development to main**

            **Merge Summary**
            ${{ github.event.head_commit.message }}

            **Merged by:** ${{ github.actor }}
            **Branch:** development → main

            These changes will **go live** at the next server restart.
          color: 10824737

      - name: Push to Development - Merry
        if: github.actor == 'merryymary' && github.ref == 'refs/heads/development'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_MERRY }}
          nodetail: true
          title: ""
          description: |
            ✅ ** Merry pushed to development**
      
            **Push Summary**
            ${{ github.event.head_commit.message }}
      
            **Commit ID:** `${{ github.event.head_commit.id }}`
            **Branch:** development
      
            This change will **not** be in the live server until it's merged
          color: 10824737      
