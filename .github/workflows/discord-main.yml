name: Main Channel Notifications

on:
  push:
    branches:
      - main

jobs:
  notify-main:
    runs-on: ubuntu-latest

    steps:
      # If the actor is "merryymary", use DISCORD_WEBHOOK_MERRY
      - name: Deployment - Merry
        if: github.actor == 'merryymary'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_MERRY }}
          content: " "
          author_name: "${{ github.actor }}"
          author_icon_url: "https://github.com/${{ github.actor }}.png"
          title: "🚀 Deployment Update"
          description: |
            ✅ **${{ github.actor }} merged development to main**

            **Merge Summary**
            ${{ github.event.head_commit.message }}

            **Merged by:** ${{ github.actor }}
            **Branch:** development → main

            These changes will go live at the next server restart.
          color: 3066993

      # If the actor is "alice", use DISCORD_WEBHOOK_ALICE
      - name: Deployment - Alice
        if: github.actor == 'alice'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_ALICE }}
          content: " "
          author_name: "${{ github.actor }}"
          author_icon_url: "https://github.com/${{ github.actor }}.png"
          title: "🚀 Deployment Update"
          description: |
            ✅ **${{ github.actor }} merged development to main**

            **Merge Summary**
            ${{ github.event.head_commit.message }}

            **Merged by:** ${{ github.actor }}
            **Branch:** development → main

            These changes will go live at the next server restart.
          color: 3066993

      # Optional: fallback for other authors
      - name: Deployment - Default
        if: github.actor != 'merryymary' && github.actor != 'alice'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_SECONDARY }}
          content: " "
          author_name: "${{ github.actor }}"
          author_icon_url: "https://github.com/${{ github.actor }}.png"
          title: "🚀 Deployment Update"
          description: |
            ✅ **${{ github.actor }} merged development to main**

            **Merge Summary**
            ${{ github.event.head_commit.message }}

            **Merged by:** ${{ github.actor }}
            **Branch:** development → main

            These changes will go live at the next server restart.
          color: 3066993
