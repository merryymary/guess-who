name: Dev Channel Notifications
on:
  create:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
    types: [opened, closed]

jobs:
  notify-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Build Commit List
        if: github.event_name == 'push'
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          COMMIT_COUNT=$(echo '${{ toJson(github.event.commits) }}' | jq length)
      
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits, skipping build"
            exit 0
          fi
      
          COMMITS="[$BRANCH_NAME] $COMMIT_COUNT new commit(s)\n"
          COMMITS+=$(echo '${{ toJson(github.event.commits) }}' | jq -r '.[] | "\(.id[0:7]) \(.message | gsub("\n"; " ")) - \(.author.name)"')
      
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Push to Dev Channel
        if: github.event_name == 'push' && env.COMMITS
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          title: "🚀 Push to ${{ github.ref_name }}"
          description: |
            **Author:** ${{ github.actor }}
      
            ${{ env.COMMITS }}
          color: 3447003
          
      # New branch creation notification
      - name: New Branch Created
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          content: " "
          title: "🌿 New Branch Created"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** `${{ github.ref_name }}`
            **Created by:** ${{ github.actor }}
          color: 10181046
      
      - name: PR Opened to Main (Ping Role)
        if: github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.base.ref == 'main'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          content: "<@&1475497736190296194>"  # ping role
          title: "📥 Pull Request Opened → main"
          description: |
            **PR Name:** ${{ github.event.pull_request.title }}
            **Author:** ${{ github.actor }}
            **Branch:** ${{ github.event.pull_request.head.ref }} → main
            **PR URL:** ${{ github.event.pull_request.html_url }}
          color: 3066993

      # Pull Request notification: development → main
      - name: PR Closed to Main (No Ping)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.base.ref == 'main'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          title: "${{ github.event.pull_request.merged && '✅ Pull Request Merged' || '❌ Pull Request Closed' }}"
          description: |
            **PR Name:** ${{ github.event.pull_request.title }}
            **Author:** ${{ github.actor }}
            **Branch:** development → main
            **PR URL:** ${{ github.event.pull_request.html_url }}
          color: ${{ github.event.pull_request.merged && 3066993 || 15158332 }}
