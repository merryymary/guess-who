name: Dev Channel Notifications
on:
  create:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      types: [opened, closed]
jobs:
  notify-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Build Commit List
        if: github.event_name == 'push'
        run: |
          # Only show branch in the header
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          COMMIT_COUNT=$(echo "${{ toJson(github.event.commits) }}" | jq length)
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "[$BRANCH_NAME] $COMMIT_COUNT new commit(s)" >> $GITHUB_ENV
          # Add each commit in GitHub style: short SHA + message + author
          echo '${{ toJson(github.event.commits) }}' | jq -r '.[] | "\(.id[0:7]) \(.message | gsub("\n"; " ")) - \(.author.name)"' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send to Dev Channel
        if: github.event_name == 'push' && github.event.commits && length(github.event.commits) > 0 && github.event.created != true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          content: " "
          title: "🚀 Push to ${{ github.ref_name }}"
          description: |
            **Author:** ${{ github.actor }}
      
            ${{ env.COMMITS }}
          color: 3447003
          
      # Branch created via GitHub UI (no commits yet)
      - name: New Branch Created (UI)
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          title: "🌿 New Branch Created"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Created by:** ${{ github.actor }}
          color: 10181046
      
      # Branch created with first push
      - name: New Branch Created (First Push)
        if: github.event_name == 'push' && github.event.created == true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEV }}
          nodetail: true
          title: "🌿 New Branch Created"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Created by:** ${{ github.actor }}
          color: 10181046

      # Pull Request notification: development → main
      - name: PR Opened to Main (Ping Role)
        if: github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_SECONDARY }}
          nodetail: true
          content: "<@1475497736190296194>"  # ping role
          title: "📥 Pull Request Opened → main"
          description: |
            **PR Name:** ${{ github.event.pull_request.title }}
            **Author:** ${{ github.actor }}
            **Branch:** development → main
            **PR URL:** ${{ github.event.pull_request.html_url }}
          color: 3066993

      # Pull Request notification: development → main
      - name: PR Closed to Main (No Ping)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_SECONDARY }}
          nodetail: true
          title: "${{ github.event.pull_request.merged && '✅ Pull Request Merged' || '❌ Pull Request Closed' }}"
          description: |
            **PR Name:** ${{ github.event.pull_request.title }}
            **Author:** ${{ github.actor }}
            **Branch:** development → main
            **PR URL:** ${{ github.event.pull_request.html_url }}
          color: ${{ github.event.pull_request.merged && 3066993 || 15158332 }}
