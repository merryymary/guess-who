name: GitHub → Discord Notifications

on:
  # Pull requests targeting main
  pull_request:
    branches:
      - main
    types: [opened, closed]
  # New branch creation
  create:

  # Pushes to any branch EXCEPT main
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      # Build commits for non main branches
      - name: Build Commit List (Push Events Only)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo '${{ toJson(github.event.commits) }}' | jq -r '.[] | "- **\(.message | gsub("\n"; " "))** — \(.author.name) (`\(.id[0:7])`)"' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      # Pull Request Opened to Main
      - name: PR Opened (Ping Role)
        if: github.event.action == 'opened'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "<@1475497736190296194>"
          title: "📥 Pull Request Opened → main"
          description: |
            **Repository:** ${{ github.repository }}
            **Author:** ${{ github.actor }}
            **Branch:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          color: 3066993

      # Pull Request Closed to Main
      - name: PR Closed
        if: github.event.action == 'closed'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "${{ github.event.pull_request.merged && '✅ Pull Request Merged' || '❌ Pull Request Closed' }}"
          description: |
            **Repository:** ${{ github.repository }}
            **Author:** ${{ github.actor }}
            **Branch:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          color: ${{ github.event.pull_request.merged && 3066993 || 15158332 }}

      #  New Branch Created
      - name: Branch Created Notification
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🌿 New Branch Created"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** `${{ github.ref_name }}`
            **Created by:** ${{ github.actor }}
          color: 10181046
          
      # Push to non-main branches
      - name: Development Push
        if: github.ref != 'refs/heads/main'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 Push to ${{ github.ref_name }}"
          description: |
            **Repo:** ${{ github.repository }}
            **Author:** ${{ github.actor }}
      
            ${{ github.event.head_commit.message }}
          color: 3447003
      
      - name: Main Branch Deployment
        if: github.ref == 'refs/heads/main'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_SECONDARY }}
          content: " "            # <-- a single space prevents reading stdout
          author_name: "${{ github.actor }}"
          author_icon_url: "https://github.com/${{ github.actor }}.png"
          title: "🚀 Deployment Update"
          description: |
            ✅ **${{ github.actor }} merged development to main**
      
            **Merge Summary**
            ${{ github.event.head_commit.message }}
      
            **Merged by:** ${{ github.actor }}
            **Branch:** development → main
      
            These changes will go live at the next server restart.
          color: 3066993
