name: GitHub → Discord Notifications

on:
  # Pull requests targeting main
  pull_request:
    branches:
      - main
    types: [opened, closed]
  # New branch creation
  create:

  # Pushes to any branch EXCEPT main
  push:
    branches-ignore:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build Commit List (Push Events Only)
        if: github.event_name == 'push'
        run: |
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo '${{ toJson(github.event.commits) }}' | jq -r '.[] |
          "- **\(.message | gsub("\n"; " "))** — \(.author.name) (`\(.id[0:7])`)"' \
          >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      # Pull Request Opened to Main
      - name: PR Opened (Ping Role)
        if: github.event.action == 'opened'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "<@1475497736190296194>"
          title: "📥 Pull Request Opened → main"
          description: |
            **Repository:** ${{ github.repository }}
            **Author:** ${{ github.actor }}
            **Branch:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          color: 3066993

      # Pull Request Closed to Main
      - name: PR Closed
        if: github.event.action == 'closed'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "${{ github.event.pull_request.merged && '✅ Pull Request Merged' || '❌ Pull Request Closed' }}"
          description: |
            **Repository:** ${{ github.repository }}
            **Author:** ${{ github.actor }}
            **Branch:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          color: ${{ github.event.pull_request.merged && 3066993 || 15158332 }}

      #  New Branch Created
      - name: Branch Created Notification
        if: github.event_name == 'create' && github.event.ref_type == 'branch'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🌿 New Branch Created"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** `${{ github.ref_name }}`
            **Created by:** ${{ github.actor }}
          color: 10181046
          
      # Push to non-main branches
      - name: Push Notification
        if: github.event_name == 'push'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 Push to Branch"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** `${{ github.ref_name }}`
            **Pushed by:** ${{ github.actor }}

            **Commits**
            ${{ env.COMMITS }}
          color: 3447003
